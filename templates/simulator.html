<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Advanced AI Simulator | Presa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style> body { font-family: 'Space Grotesk', sans-serif; } </style>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen p-8">

    <div class="max-w-7xl mx-auto space-y-8">
        
        <div class="text-center">
            <h1 class="text-4xl font-extrabold uppercase tracking-tighter text-blue-600">Presa Advanced Engine</h1>
            <p class="text-slate-500 font-bold tracking-widest uppercase text-sm">Now powered by Roles, KAST & First Bloods</p>
        </div>

        <div class="flex flex-col lg:flex-row gap-8">
            
            <div class="w-full lg:w-1/3 bg-white p-6 rounded-2xl shadow-lg border border-slate-200">
                <h2 class="text-xl font-bold uppercase tracking-tighter mb-6 text-slate-800">Parameters</h2>
                
                <label class="block text-sm font-bold uppercase text-slate-500 mb-2">Select Player</label>
                <select id="playerInput" class="w-full bg-slate-50 border border-slate-300 p-3 rounded-lg mb-6 font-bold text-lg focus:outline-blue-500">
                    {% for player in players %}
                        <option value="{{ player }}">{{ player }}</option>
                    {% endfor %}
                </select>

                <label class="block text-sm font-bold uppercase text-slate-500 mb-2">
                    Forecast Timeline: <span id="gameVal" class="text-blue-600">50 Games</span>
                </label>
                <input type="range" id="gameSlider" min="10" max="100" value="50" step="10" class="w-full mb-8 accent-blue-600">
                
                <button onclick="runAI()" id="runBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold uppercase tracking-widest py-4 rounded-xl transition-all shadow-md active:scale-95">
                    Generate Trajectory
                </button>
            </div>

            <div class="w-full lg:w-2/3 bg-slate-900 rounded-2xl shadow-xl overflow-hidden flex flex-col relative">
                
                <div id="loading" class="hidden absolute inset-0 bg-slate-900/95 flex items-center justify-center z-50">
                    <p class="animate-pulse font-bold tracking-widest text-blue-400 text-2xl">ANALYZING BIOMETRICS...</p>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 p-6 bg-slate-800 border-b border-slate-700">
                    <div>
                        <p class="text-[10px] text-slate-400 uppercase tracking-widest">Skill Ceiling</p>
                        <h3 id="resCeiling" class="text-xl font-bold text-white">--</h3>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-400 uppercase tracking-widest">Primary Role</p>
                        <h3 id="resRole" class="text-xl font-bold text-blue-400">--</h3>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-400 uppercase tracking-widest">Win Rate</p>
                        <h3 id="resWin" class="text-xl font-bold text-white">--</h3>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-400 uppercase tracking-widest">Projected Rank</p>
                        <h3 id="resFinal" class="text-xl font-bold text-green-400">--</h3>
                    </div>
                </div>

                <div class="grid grid-cols-3 md:grid-cols-6 gap-4 p-6 border-b border-slate-800 bg-slate-900">
                    <div class="text-center"><p class="text-[10px] text-slate-500 uppercase">KDA</p><p id="resKda" class="font-bold text-white">0.0</p></div>
                    <div class="text-center"><p class="text-[10px] text-slate-500 uppercase">ACS</p><p id="resAcs" class="font-bold text-white">0</p></div>
                    <div class="text-center"><p class="text-[10px] text-slate-500 uppercase">KAST</p><p id="resKast" class="font-bold text-white">0%</p></div>
                    <div class="text-center"><p class="text-[10px] text-slate-500 uppercase">ADR</p><p id="resAdr" class="font-bold text-white">0</p></div>
                    <div class="text-center"><p class="text-[10px] text-slate-500 uppercase">HS%</p><p id="resHs" class="font-bold text-white">0%</p></div>
                    <div class="text-center"><p class="text-[10px] text-slate-500 uppercase">FB / FD</p><p id="resEntry" class="font-bold text-white">0 / 0</p></div>
                </div>

                <div class="p-6 flex-grow h-64 relative">
                    <h4 class="text-xs text-slate-400 uppercase tracking-widest font-bold mb-4 absolute top-6 left-6">Predicted RR Trajectory</h4>
                    <canvas id="trajectoryChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const slider = document.getElementById('gameSlider');
        slider.oninput = function() { document.getElementById('gameVal').innerText = this.value + ' Games'; }

        let chartInstance = null;
        const ctx = document.getElementById('trajectoryChart').getContext('2d');

        function initChart(dataArray, games) {
            if (chartInstance) chartInstance.destroy();
            
            const labels = Array.from({length: parseInt(games) + 1}, (_, i) => i);
            const isClimbing = dataArray[dataArray.length - 1] >= 0;
            const lineColor = isClimbing ? '#4ade80' : '#f87171';
            const bgColor = isClimbing ? 'rgba(74, 222, 128, 0.1)' : 'rgba(248, 113, 113, 0.1)';

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Net RR Change',
                        data: dataArray,
                        borderColor: lineColor,
                        backgroundColor: bgColor,
                        borderWidth: 3,
                        tension: 0.3,
                        fill: true,
                        pointRadius: 0,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#64748b' } },
                        y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }
                    }
                }
            });
        }

        async function runAI() {
            const player = document.getElementById('playerInput').value;
            const games = slider.value;
            const loading = document.getElementById('loading');
            
            loading.classList.remove('hidden');

            try {
                // Uses the relative path to automatically hit your Render backend
                const response = await fetch(`/api/predict/${encodeURIComponent(player)}/${games}`);
                const data = await response.json();

                if (data.error) {
                    alert("API Error: " + data.error);
                    loading.classList.add('hidden');
                    return;
                }

                setTimeout(() => {
                    document.getElementById('resCeiling').innerText = data.skill_ceiling;
                    document.getElementById('resRole').innerText = data.primary_role;
                    document.getElementById('resWin').innerText = data.win_rate + '%';
                    
                    const finalEl = document.getElementById('resFinal');
                    finalEl.innerText = data.projected_rank;
                    finalEl.className = data.net_rr >= 0 ? "text-xl font-bold text-green-400" : "text-xl font-bold text-red-400";

                    document.getElementById('resKda').innerText = data.stats.kda;
                    document.getElementById('resAcs').innerText = data.stats.acs;
                    document.getElementById('resKast').innerText = data.stats.kast + '%';
                    document.getElementById('resAdr').innerText = data.stats.adr;
                    document.getElementById('resHs').innerText = data.stats.hs + '%';
                    document.getElementById('resEntry').innerText = `${data.stats.fb} / ${data.stats.fd}`;

                    initChart(data.trajectory, games);
                    loading.classList.add('hidden');
                }, 600);

            } catch (err) {
                alert("Network error fetching AI Prediction.");
                loading.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
