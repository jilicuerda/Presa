<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presa - Secret AI Spider Lab</title>
    <!-- Chart.js for the Trajectory Graph -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f1923;
            --panel-bg: #1f2d3a;
            --accent: #ff4655;
            --text-main: #ece8e1;
            --text-muted: #8b97a3;
            --success: #00ffaa;
        }

        body {
            margin: 0;
            padding: 2rem;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .controls {
            background-color: var(--panel-bg);
            padding: 1.5rem;
            border-radius: 8px;
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            align-items: center;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        select, input, button {
            padding: 0.75rem 1rem;
            border: 1px solid var(--text-muted);
            border-radius: 4px;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
        }

        button {
            background-color: var(--accent);
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        button:hover {
            background-color: #e03e4d;
        }

        button:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
        }

        .dashboard {
            display: none; /* Hidden until simulation runs */
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .panel {
            background-color: var(--panel-bg);
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background-color: var(--bg-color);
            padding: 1rem;
            border-radius: 6px;
            text-align: center;
            border-left: 4px solid var(--accent);
        }

        .stat-card h3 {
            margin: 0;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .stat-card .value {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 0.5rem;
        }

        .positive { color: var(--success); }
        .negative { color: var(--accent); }

        .insights-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .insights-list li {
            background-color: var(--bg-color);
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 0.75rem;
            border-left: 4px solid #00ffaa;
            line-height: 1.5;
        }

        /* Loading spinner */
        .loader {
            display: none;
            text-align: center;
            margin: 2rem 0;
            font-size: 1.2rem;
            color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Spider Lab Simulator</h1>
        <p>Run advanced predictive models based on global Random Forest data.</p>
    </div>

    <div class="controls">
        <div>
            <label for="playerSelect" style="display:block; margin-bottom:0.5rem; color:var(--text-muted);">Select Player</label>
            <select id="playerSelect">
                <!-- Jinja injects the player roster here from app.py -->
                {% for player in players %}
                    <option value="{{ player }}">{{ player }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div>
            <label for="gamesInput" style="display:block; margin-bottom:0.5rem; color:var(--text-muted);">Games to Simulate</label>
            <input type="number" id="gamesInput" value="50" min="1" max="500">
        </div>

        <div style="margin-top: 1.5rem;">
            <button id="runSimBtn" onclick="runSimulation()">Run Simulation</button>
        </div>
    </div>

    <div class="loader" id="loader">🧠 The AI is analyzing the data...</div>

    <div class="dashboard" id="dashboard">
        
        <!-- Left Column: Stats & Insights -->
        <div class="left-col">
            <div class="panel">
                <h2 style="margin-top:0; color:var(--accent);">Prediction Summary</h2>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Current Rank</h3>
                        <div class="value" id="resCurrentRank">-</div>
                    </div>
                    <div class="stat-card">
                        <h3>Skill Ceiling</h3>
                        <div class="value" id="resCeiling">-</div>
                    </div>
                    <div class="stat-card">
                        <h3>Projected Rank</h3>
                        <div class="value" id="resProjected">-</div>
                    </div>
                    <div class="stat-card">
                        <h3>Net RR</h3>
                        <div class="value" id="resRR">-</div>
                    </div>
                </div>

                <h3 style="margin-top:2rem; border-bottom:1px solid var(--text-muted); padding-bottom:0.5rem;">AI Coaching Insights</h3>
                <ul class="insights-list" id="insightsContainer">
                    <!-- Javascript will inject the personalized AI sentences here -->
                </ul>
            </div>
        </div>

        <!-- Right Column: Graph -->
        <div class="right-col">
            <div class="panel">
                <h2 style="margin-top:0; color:var(--accent);">RR Trajectory Forecast</h2>
                <canvas id="trajectoryChart"></canvas>
            </div>
            
            <div class="panel" style="margin-top: 2rem;">
                <h3 style="margin-top:0;">Raw Averages</h3>
                <div style="display: flex; gap: 1rem; flex-wrap: wrap;" id="rawStatsContainer">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentChart = null;

        async function runSimulation() {
            const player = document.getElementById('playerSelect').value;
            const games = document.getElementById('gamesInput').value;
            const btn = document.getElementById('runSimBtn');
            const loader = document.getElementById('loader');
            const dashboard = document.getElementById('dashboard');

            // Reset UI
            btn.disabled = true;
            dashboard.style.display = 'none';
            loader.style.display = 'block';

            try {
                // Fetch the prediction from our Flask API
                const response = await fetch(`/api/predict/${encodeURIComponent(player)}/${games}`);
                const data = await response.json();

                if (data.error) {
                    alert('Error: ' + data.error);
                    return;
                }

                // 1. Update Top Stats
                document.getElementById('resCurrentRank').innerText = data.current_rank;
                document.getElementById('resCeiling').innerText = data.skill_ceiling;
                document.getElementById('resProjected').innerText = data.projected_rank;
                
                const rrElement = document.getElementById('resRR');
                rrElement.innerText = (data.net_rr > 0 ? '+' : '') + data.net_rr;
                rrElement.className = 'value ' + (data.net_rr >= 0 ? 'positive' : 'negative');

                // 2. Update AI Insights
                const insightsContainer = document.getElementById('insightsContainer');
                insightsContainer.innerHTML = ''; // clear old insights
                data.insights.forEach(insight => {
                    const li = document.createElement('li');
                    li.innerText = insight;
                    // Make negative insights look red
                    if (insight.includes('Red Flag') || insight.includes('Major weakness') || insight.includes('penalize')) {
                        li.style.borderLeftColor = 'var(--accent)';
                    }
                    insightsContainer.appendChild(li);
                });

                // 3. Update Raw Stats
                const rawStats = document.getElementById('rawStatsContainer');
                rawStats.innerHTML = `
                    <div style="background:var(--bg-color); padding:0.5rem 1rem; border-radius:4px;">K/D: ${data.stats.kills} / ${data.stats.deaths}</div>
                    <div style="background:var(--bg-color); padding:0.5rem 1rem; border-radius:4px;">ACS: ${data.stats.acs}</div>
                    <div style="background:var(--bg-color); padding:0.5rem 1rem; border-radius:4px;">ADR: ${data.stats.adr}</div>
                    <div style="background:var(--bg-color); padding:0.5rem 1rem; border-radius:4px;">KAST: ${data.stats.kast}%</div>
                    <div style="background:var(--bg-color); padding:0.5rem 1rem; border-radius:4px;">Win Rate: ${data.win_rate}%</div>
                `;

                // 4. Draw Chart
                renderChart(data.trajectory, games);

                // Show dashboard
                dashboard.style.display = 'grid';

            } catch (err) {
                console.error(err);
                alert("Failed to connect to the Spider Brain API.");
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }

        function renderChart(trajectoryData, totalGames) {
            const ctx = document.getElementById('trajectoryChart').getContext('2d');
            
            // Destroy old chart if it exists so we don't overlap
            if (currentChart) {
                currentChart.destroy();
            }

            // Create Labels [0, 1, 2, ... games]
            const labels = Array.from({length: trajectoryData.length}, (_, i) => i);

            // Determine line color based on ending RR
            const endRR = trajectoryData[trajectoryData.length - 1];
            const lineColor = endRR >= 0 ? '#00ffaa' : '#ff4655';

            currentChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Net RR',
                        data: trajectoryData,
                        borderColor: lineColor,
                        backgroundColor: 'rgba(0, 0, 0, 0)',
                        borderWidth: 3,
                        pointRadius: 0, // hide dots for a cleaner line
                        tension: 0.2 // slight curve
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: '#8b97a3' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#8b97a3' },
                            title: {
                                display: true,
                                text: 'Games Played',
                                color: '#8b97a3'
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
