<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Team Presa - Select Division</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 
                        "primary": "#0348a2", 
                        "accent": "#f7b003",   
                        "navy-dark": "#0a172a", 
                        "navy-text": "#0f2747"  
                    }, 
                    fontFamily: { "display": ["Space Grotesk", "sans-serif"] },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s ease-out forwards'
                    }
                } 
            } 
        }
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0423QF45S7"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-0423QF45S7');
    </script>
</head>
<body class="bg-slate-50 text-navy-text font-display min-h-screen flex flex-col relative overflow-x-hidden">
    
    <div class="absolute inset-0 z-0 opacity-[0.03] bg-[url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2670&auto=format&fit=crop')] bg-cover bg-center fixed"></div>
    <div class="absolute inset-0 bg-gradient-to-t from-slate-100 via-transparent to-transparent z-0 fixed pointer-events-none"></div>

    <header class="sticky top-0 z-50 flex items-center justify-between border-b border-slate-200 bg-white/95 backdrop-blur-md px-6 py-4 shadow-sm w-full">
        <div class="flex items-center gap-3">
            <img src="/static/assets/LOGO_PRESA.png" alt="Logo" class="h-8 w-8 object-contain">
            <h2 class="text-navy-dark text-lg font-extrabold uppercase tracking-tighter">TEAM PRESA</h2>
        </div>
        
        <nav class="hidden lg:flex items-center gap-8 text-xs font-bold uppercase tracking-wider text-slate-500 absolute left-1/2 -translate-x-1/2">
            <a href="/" class="text-accent border-b-2 border-accent pb-1">Home</a>
            <a href="/roster?team=main" class="hover:text-primary transition-colors pb-1">Main Roster</a>
            <a href="/roster?team=academy" class="hover:text-primary transition-colors pb-1">Academy</a>
            <a href="https://valorant.gankster.gg/teams/117773/presa" target="_blank" class="hover:text-primary transition-colors pb-1 flex items-center gap-1"><span class="material-symbols-outlined text-sm">public</span> Gankster</a>
            <a href="https://discordapp.com/users/286632547285467137" target="_blank" class="hover:text-primary transition-colors pb-1 flex items-center gap-1"><span class="material-symbols-outlined text-sm">support_agent</span> Manager</a>
            <a href="https://discordapp.com/users/371369284351557662" target="_blank" class="hover:text-primary transition-colors pb-1 flex items-center gap-1"><span class="material-symbols-outlined text-sm">sports</span> Coach</a>
        </nav>

        <a href="https://discord.gg/7A4uM4hzSE" target="_blank" class="bg-accent hover:bg-yellow-500 text-white px-5 py-2 rounded shadow-sm font-bold uppercase tracking-wider text-xs transition-colors flex items-center gap-2">
            Join Community
        </a>
    </header>

    <main class="relative z-10 w-full max-w-6xl mx-auto text-center flex flex-col items-center pt-8 md:pt-16 px-6">
        
        <div class="relative inline-block mb-6">
            <div class="absolute inset-0 bg-accent rounded-full blur-md opacity-30 transform scale-110"></div>
            <div class="relative bg-white p-2 rounded-full border border-accent/50 shadow-lg">
                <img src="/static/assets/LOGO_PRESA.png" alt="Team Presa" class="h-24 w-24 md:h-32 md:w-32 object-contain rounded-full">
            </div>
        </div>
        
        <h1 class="text-4xl md:text-7xl font-extrabold uppercase tracking-tighter mb-2 text-navy-dark">TEAM PRESA</h1>
        <p class="text-slate-500 text-sm md:text-base tracking-widest uppercase mb-12 font-medium">Select Division</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-3xl mx-auto mb-16">
            <a href="/roster?team=main" class="group relative overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm hover:shadow-xl hover:border-primary transition-all duration-300 p-12 flex flex-col items-center justify-center h-64">
                <span class="material-symbols-outlined text-4xl text-primary group-hover:scale-110 transition-transform duration-300 mb-4">workspace_premium</span>
                <h2 class="text-2xl font-bold text-navy-dark uppercase tracking-wider">Main Roster</h2>
                <p class="text-slate-500 mt-2 font-mono uppercase text-xs tracking-widest">View Tier 1 Stats</p>
                <div class="absolute bottom-0 w-full h-1 bg-primary transform translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
            </a>

            <a href="/roster?team=academy" class="group relative overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm hover:shadow-xl hover:border-accent transition-all duration-300 p-12 flex flex-col items-center justify-center h-64">
                <span class="material-symbols-outlined text-4xl text-navy-dark group-hover:scale-110 transition-transform duration-300 mb-4">school</span>
                <h2 class="text-2xl font-bold text-navy-dark uppercase tracking-wider">Academy</h2>
                <p class="text-slate-500 mt-2 font-mono uppercase text-xs tracking-widest">View Prospects</p>
                <div class="absolute bottom-0 w-full h-1 bg-accent transform translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
            </a>
        </div>

        <div id="newsletter-section" class="w-full max-w-4xl text-left mb-12 hidden opacity-0 animate-fade-in-up">
            <h3 class="text-lg font-bold uppercase tracking-wider mb-6 flex items-center justify-center gap-2 text-navy-dark border-b border-slate-200 pb-3">
                <span class="material-symbols-outlined text-primary">campaign</span> Latest Intel
            </h3>
            <div id="news-container" class="space-y-6 w-full">
                </div>
        </div>

    </main>

    <script>
        function getRoleIcon(role) {
            const r = role ? role.toLowerCase() : "";
            if (r.includes("duelist")) return "swords";
            if (r.includes("sentinel")) return "security";
            if (r.includes("controller") || r.includes("smoker")) return "smoke_free";
            if (r.includes("initiator")) return "radar";
            if (r.includes("igl")) return "psychology";
            return "sports_esports";
        }

        async function loadNews() {
            const section = document.getElementById('newsletter-section');
            const container = document.getElementById('news-container');
            
            try {
                const response = await fetch('/api/news');
                const news = await response.json();
                
                if (!news || news.length === 0) return; 
                
                container.innerHTML = "";
                
                news.forEach((item, index) => {
                    const delay = index * 150;
                    let cardHTML = "";

                    if (item.type === 'player_climb') {
                        let agent = item.player.fixed_agent || "Jett";
                        let safeAgent = agent.charAt(0).toUpperCase() + agent.slice(1).toLowerCase();
                        const roleIcon = getRoleIcon(item.player.role);
                        const profileLink = `/player?name=${encodeURIComponent(item.player.name)}&tag=${encodeURIComponent(item.player.tag)}&agent=${encodeURIComponent(safeAgent)}`;
                        
                        cardHTML = `
                        <div class="w-full lg:w-72 h-[380px] shrink-0 relative bg-white rounded-xl overflow-hidden border border-slate-200 shadow-sm group flex flex-col">
                            <div class="absolute inset-0 z-0 bg-slate-100">
                                <img class="w-full h-full object-cover opacity-60 group-hover:opacity-100 group-hover:scale-105 transition-all duration-500" src="/static/assets/agents/${safeAgent}_Artwork-large.webp" onerror="this.src='/static/assets/agents/Jett_Artwork-large.webp'">
                                <div class="absolute inset-0 bg-gradient-to-t from-white via-white/80 to-transparent"></div>
                            </div>
                            <div class="relative z-20 flex flex-col h-full p-6 mt-auto">
                                <div class="flex items-center gap-2 text-primary text-xs font-bold uppercase mb-1">
                                    <span class="material-symbols-outlined text-sm">${roleIcon}</span>${item.player.role}
                                </div>
                                <h4 class="text-3xl font-extrabold text-navy-dark uppercase tracking-tighter leading-none mb-1">${item.player.name}</h4>
                                <span class="text-slate-500 text-xs font-mono tracking-widest uppercase mb-4">#${item.player.tag}</span>
                                
                                <div class="mt-auto bg-slate-50 border border-slate-200 p-3 rounded flex justify-between items-center mb-3">
                                    <p class="text-[10px] text-slate-500 uppercase font-bold">New Rank</p>
                                    <p class="text-navy-dark text-sm font-bold font-mono truncate">${item.player.rank}</p>
                                </div>
                                <a href="${profileLink}" class="w-full bg-white border border-slate-200 hover:border-primary text-navy-dark hover:text-primary font-bold py-2.5 rounded flex items-center justify-center uppercase text-xs tracking-wide transition-colors shadow-sm">
                                    VIEW STATS
                                </a>
                            </div>
                        </div>`;

                        container.innerHTML += `
                        <div class="bg-white border border-slate-200 shadow-sm rounded-xl p-6 flex flex-col lg:flex-row items-center justify-between gap-6 hover:border-primary transition-colors opacity-0 animate-fade-in-up" style="animation-delay: ${delay}ms;">
                            <div class="flex-1 space-y-2 text-center lg:text-left">
                                <div class="flex items-center justify-center lg:justify-start gap-2 text-primary text-xs tracking-widest font-bold font-mono uppercase">
                                    <span class="material-symbols-outlined text-sm">trending_up</span> Rank Ladder Promotion
                                </div>
                                <h2 class="text-2xl font-extrabold text-navy-dark tracking-tight uppercase leading-snug">${item.message}</h2>
                                <p class="text-slate-500 text-sm font-medium">Assigned Division: <span class="text-navy-dark font-bold uppercase">${item.division}</span></p>
                            </div>
                            ${cardHTML}
                        </div>`;

                    } else if (item.type === 'tournament') {
                        let iconHtml = `<span class="material-symbols-outlined text-5xl text-accent">workspace_premium</span>`;
                        if (item.logo_url && item.logo_url.trim() !== "") {
                            iconHtml = `<img src="${item.logo_url}" alt="Event Logo" class="h-16 w-16 object-contain">`;
                        }

                        container.innerHTML += `
                        <div class="bg-white border border-slate-200 shadow-sm hover:shadow-md rounded-xl p-6 flex flex-col md:flex-row items-center gap-6 opacity-0 animate-fade-in-up transition-shadow" style="animation-delay: ${delay}ms;">
                            <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 flex items-center justify-center shrink-0 size-24 shadow-inner">
                                ${iconHtml}
                            </div>
                            <div class="space-y-1 text-center md:text-left">
                                <div class="text-accent text-xs tracking-widest font-bold font-mono uppercase flex items-center justify-center md:justify-start gap-1">
                                    <span class="material-symbols-outlined text-sm">emoji_events</span> Tournament Victory
                                </div>
                                <h2 class="text-xl md:text-2xl font-extrabold text-navy-dark tracking-tight uppercase">
                                    Presa ${item.division.toUpperCase()} secured <span class="text-primary">${item.placement}</span> in ${item.event_name}!
                                </h2>
                                <p class="text-slate-500 text-xs uppercase font-mono tracking-wider">Database validated record</p>
                            </div>
                        </div>`;
                    }
                });

                section.classList.remove('hidden');
                setTimeout(() => section.classList.remove('opacity-0'), 10);

            } catch (error) {
                console.error("Error drawing newsletter system:", error);
            }
        }

        document.addEventListener("DOMContentLoaded", loadNews);
    </script>
</body>
</html>
