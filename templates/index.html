<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Team Presa - Select Division</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#ec131e", "background-dark": "#180e0f", "surface-dark": "#221011" }, fontFamily: { "display": ["Space Grotesk", "sans-serif"] } } } }
    </script>
</head>
<body class="bg-background-dark text-white font-display min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
    
    <div class="absolute inset-0 z-0 opacity-20 bg-[url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2670&auto=format&fit=crop')] bg-cover bg-center"></div>
    <div class="absolute inset-0 bg-gradient-to-t from-background-dark via-background-dark/80 to-background-dark z-0"></div>

    <div class="relative z-10 w-full max-w-5xl text-center">
        <img src="/static/assets/presa.png" alt="Team Presa" class="mx-auto h-32 w-32 object-contain mb-8 drop-shadow-[0_0_15px_rgba(236,19,30,0.5)]">
        
        <h1 class="text-5xl md:text-7xl font-bold uppercase tracking-tighter mb-4">TEAM PRESA</h1>
        <p class="text-gray-400 text-lg md:text-xl tracking-widest uppercase mb-16">Select Division</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <a href="/roster?team=main" class="group relative overflow-hidden rounded-2xl border border-[#482325] hover:border-primary transition-colors bg-surface-dark p-12 flex flex-col items-center justify-center h-80">
                <div class="absolute inset-0 bg-primary/0 group-hover:bg-primary/10 transition-colors z-0"></div>
                <span class="material-symbols-outlined text-6xl text-gray-500 group-hover:text-primary transition-colors mb-4 relative z-10">workspace_premium</span>
                <h2 class="text-4xl font-bold text-white uppercase tracking-wider relative z-10">Main Roster</h2>
                <p class="text-gray-500 mt-2 font-mono uppercase relative z-10 group-hover:text-white transition-colors">View Tier 1 Stats</p>
                <div class="absolute bottom-0 w-full h-1 bg-primary transform translate-y-full group-hover:translate-y-0 transition-transform"></div>
            </a>

            <a href="/roster?team=academy" class="group relative overflow-hidden rounded-2xl border border-[#482325] hover:border-white transition-colors bg-surface-dark p-12 flex flex-col items-center justify-center h-80">
                <div class="absolute inset-0 bg-white/0 group-hover:bg-white/5 transition-colors z-0"></div>
                <span class="material-symbols-outlined text-6xl text-gray-500 group-hover:text-white transition-colors mb-4 relative z-10">school</span>
                <h2 class="text-4xl font-bold text-white uppercase tracking-wider relative z-10">Academy</h2>
                <p class="text-gray-500 mt-2 font-mono uppercase relative z-10 group-hover:text-white transition-colors">View Prospects</p>
                <div class="absolute bottom-0 w-full h-1 bg-white transform translate-y-full group-hover:translate-y-0 transition-transform"></div>
            </a>

        </div>
    </div>
</body>
</html>
