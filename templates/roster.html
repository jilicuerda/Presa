<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0423QF45S7"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-0423QF45S7');
    </script>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Team Roster - Presa</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 
                        "primary": "#0348a2", 
                        "accent": "#f7b003", 
                        "navy-dark": "#0a172a", 
                        "navy-text": "#0f2747" 
                    }, 
                    fontFamily: { "display": ["Space Grotesk", "sans-serif"] }
                } 
            } 
        }
    </script>
    <style>
        .role-section { margin-bottom: 3rem; }
        
        .roster-grid {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: flex-start;
            gap: 1rem;
        }

        /* 1. The Accordion Hover Effect (Expands the active card, shrinks neighbors) */
        @media (min-width: 1024px) {
            .roster-grid:hover > .roster-card { width: 12% !important; }
            .roster-grid > .roster-card:hover { width: 45% !important; }
        }

        /* 2. The Intro Card (The static visual layer) */
        .intro-card {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            background: white;
            transition: transform 0.8s cubic-bezier(0.76, 0, 0.24, 1);
        }

        /* 3. The Video Slide-Up Effect (ONLY triggers if the clip is verified and ready) */
        .roster-card.clip-ready:hover .intro-card {
            transform: translateY(-100%);
        }
    </style>
</head>
<body class="bg-slate-50 text-navy-text font-display min-h-screen flex flex-col overflow-x-hidden relative">

    <div class="absolute inset-0 z-0 opacity-[0.03] bg-[url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2670&auto=format&fit=crop')] bg-cover bg-center fixed pointer-events-none"></div>

    <header class="sticky top-0 z-50 flex items-center justify-between border-b border-slate-200 bg-white/95 backdrop-blur-md px-6 py-4 shadow-sm w-full">
        <div class="flex items-center gap-3">
            <img src="/static/assets/LOGO_PRESA.png" alt="Logo" class="h-8 w-8 object-contain">
            <h2 class="text-navy-dark text-lg font-extrabold uppercase tracking-tighter">TEAM PRESA</h2>
        </div>
        
        <nav class="hidden lg:flex items-center gap-8 text-xs font-bold uppercase tracking-wider text-slate-500 absolute left-1/2 -translate-x-1/2">
            <a href="/" class="hover:text-primary transition-colors pb-1">Home</a>
            <a href="/roster?team=main" id="nav-main" class="hover:text-primary transition-colors pb-1">Main Roster</a>
            <a href="/roster?team=academy" id="nav-academy" class="hover:text-primary transition-colors pb-1">Academy</a>
            <a href="https://valorant.gankster.gg/teams/117773/presa" target="_blank" class="hover:text-primary transition-colors pb-1 flex items-center gap-1"><span class="material-symbols-outlined text-sm">public</span> Gankster</a>
            <a href="https://discordapp.com/users/286632547285467137" target="_blank" class="hover:text-primary transition-colors pb-1 flex items-center gap-1"><span class="material-symbols-outlined text-sm">support_agent</span> Manager</a>
            <a href="https://discordapp.com/users/371369284351557662" target="_blank" class="hover:text-primary transition-colors pb-1 flex items-center gap-1"><span class="material-symbols-outlined text-sm">sports</span> Coach</a>
        </nav>

        <a href="https://discord.gg/7A4uM4hzSE" target="_blank" class="bg-accent hover:bg-yellow-500 text-white px-5 py-2 rounded shadow-sm font-bold uppercase tracking-wider text-xs transition-colors flex items-center gap-2">
            Join Community
        </a>
    </header>

    <main class="flex-1 p-6 lg:p-10 w-full max-w-[1920px] mx-auto relative z-10">
        
        <div class="mb-12 border-b border-slate-200 pb-6">
            <h1 id="page-title" class="text-4xl md:text-6xl font-extrabold uppercase tracking-tighter text-navy-dark">LOADING...</h1>
        </div>

        <div class="mb-16">
            <h3 class="text-xl font-bold uppercase tracking-wider mb-6 flex items-center gap-2 text-navy-dark">
                <span class="material-symbols-outlined text-accent">emoji_events</span> Trophy Cabinet
            </h3>
            <div id="trophy-cabinet" class="flex overflow-x-auto gap-6 pb-6 snap-x hide-scrollbar">
                <div class="text-slate-400 italic text-sm">Loading tournament history...</div>
            </div>
        </div>

        <div id="roster-container">
            </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const teamId = urlParams.get('team') || 'main';
        document.getElementById('page-title').innerText = `PRESA ${teamId.toUpperCase()}`;
        if(teamId === 'main') document.getElementById('nav-main').classList.add('text-primary', 'border-b-2', 'border-primary');
        else if (teamId === 'academy') document.getElementById('nav-academy').classList.add('text-primary', 'border-b-2', 'border-primary');

        function getRoleIcon(role) {
            const r = role.toLowerCase();
            if (r.includes("duelist")) return "swords";
            if (r.includes("sentinel")) return "security";
            if (r.includes("controller") || r.includes("smoker")) return "smoke_free";
            if (r.includes("initiator")) return "radar";
            if (r.includes("igl")) return "psychology";
            return "sports_esports";
        }

        async function loadData() {
            try {
                const [tRes, rRes] = await Promise.all([fetch(`/api/tournaments/${teamId}`), fetch(`/api/team-history/${teamId}`)]);
                const tournaments = await tRes.json();
                const data = await rRes.json();

                // Trophy Cabinet Generation
                const cabinet = document.getElementById('trophy-cabinet');
                cabinet.innerHTML = tournaments.length ? "" : '<div class="text-slate-500 italic">No tournament records.</div>';
                tournaments.forEach(t => {
                    let logo = (t.logo_url && t.logo_url.length > 5) ? `<img src="${t.logo_url}" class="h-12 w-12 object-contain mb-2">` : `<span class="material-symbols-outlined text-3xl text-slate-300 mb-2">emoji_events</span>`;
                    cabinet.innerHTML += `
                    <div class="min-w-[160px] bg-white border border-slate-200 rounded-xl p-4 flex flex-col items-center shadow-sm">
                        ${logo}
                        <h4 class="text-[10px] font-bold text-slate-400 uppercase text-center truncate w-full">${t.name}</h4>
                        <span class="text-primary font-bold text-sm uppercase">${t.placement}</span>
                    </div>`;
                });

                // Roster Groups Generation
                const container = document.getElementById('roster-container');
                const groups = { player: [], sub: [], coach: [] };
                data.roster.forEach(p => { if (groups[p.type]) groups[p.type].push(p); });

                container.innerHTML = "";
                for (const [groupName, members] of Object.entries(groups)) {
                    if (members.length === 0) continue;
                    const section = document.createElement('div');
                    section.className = 'role-section';
                    section.innerHTML = `<h3 class="text-xs font-bold uppercase text-slate-400 mb-6 tracking-widest">${groupName}</h3>`;
                    
                    const grid = document.createElement('div');
                    grid.className = 'roster-grid';
                    
                    members.forEach(p => {
                        let safeAgent = p.main_agent.charAt(0).toUpperCase() + p.main_agent.slice(1).toLowerCase();
                        let roleColor = p.type === 'sub' ? 'bg-slate-200 text-slate-600' : (p.type === 'coach' ? 'bg-navy-dark text-white' : 'bg-primary text-white');
                        let encodedName = encodeURIComponent(p.name);
                        
                        grid.innerHTML += `
                        <div class="roster-card relative rounded-xl overflow-hidden border border-slate-200 shadow-sm transition-all duration-500 ease-out cursor-pointer h-[420px] shrink-0 group bg-slate-900" 
                             style="width: calc(20% - 0.8rem)"
                             data-clip="${encodedName}"
                             onclick="window.location.href='/player?name=${encodedName}&tag=${encodeURIComponent(p.tag)}&agent=${encodeURIComponent(p.main_agent)}'">
                            
                            <div class="intro-card flex flex-col">
                                <div class="relative h-2/3 overflow-hidden bg-slate-100">
                                    <img src="/static/assets/agents/${safeAgent}_Artwork-large.webp" onerror="this.src='/static/assets/agents/Jett_Artwork-large.webp'" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity duration-500">
                                    <div class="absolute inset-0 bg-gradient-to-t from-white via-white/20 to-transparent"></div>
                                </div>

                                <div class="absolute top-4 right-4 z-20">
                                    <span class="${roleColor} text-[10px] font-bold uppercase tracking-widest px-2 py-1 rounded shadow-sm">${p.type}</span>
                                </div>

                                <div class="relative z-20 flex flex-col h-full p-5 mt-auto min-w-[200px] bg-white">
                                    <div class="flex items-center gap-2 text-primary text-[10px] font-bold uppercase tracking-widest mb-1">
                                        <span class="material-symbols-outlined text-sm">${getRoleIcon(p.role)}</span>${p.role}
                                    </div>
                                    <h4 class="text-3xl font-extrabold text-navy-dark uppercase tracking-tighter leading-none mb-1 group-hover:text-primary transition-colors">${p.name}</h4>
                                    <span class="text-slate-500 text-xs font-mono tracking-widest uppercase mb-3">#${p.tag}</span>
                                    
                                    <div class="mt-auto">
                                        <div class="bg-slate-50 border border-slate-200 p-2.5 rounded flex justify-between items-center transition-colors shadow-sm">
                                            <p class="text-[10px] text-slate-500 uppercase font-bold">Rank</p>
                                            <p class="text-navy-dark text-sm font-bold font-mono truncate">${p.rank}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>`;
                    });
                    section.appendChild(grid);
                    container.appendChild(section);
                }

                // Attach videos silently in the background
// 3. Attach videos silently in the background
                document.querySelectorAll('.roster-card').forEach(card => {
                    const fullName = card.getAttribute('data-clip');
                    if (!fullName) return;

    // --- NEW LOGIC: Take only the first word of the name ---
    // decodeURIComponent turns "%20" back into a space, then we split by space
                        const firstWord = decodeURIComponent(fullName).split(' ')[0];
                        const clipFilename = `${firstWord}.mp4`;

                        const vid = document.createElement('video');
                        vid.muted = true;
                        vid.loop = true;
                        vid.playsInline = true;
                        vid.className = "absolute inset-0 w-full h-full object-cover z-0";
    
    // Immediately attach to the DOM
                        card.insertBefore(vid, card.firstChild);
                    
                        // Unlock slide animation only if video loads
                        vid.onloadeddata = () => {
                            card.classList.add('clip-ready');
                        };
                        
                        // Silently remove if file does not exist
                        vid.onerror = () => {
                            vid.remove();
                        };
                    
                        // Playback listeners
                        card.addEventListener('mouseenter', () => {
                            if (card.classList.contains('clip-ready')) {
                                vid.play().catch(()=>{});
                            }
                        });
                        
                        card.addEventListener('mouseleave', () => {
                            if (card.classList.contains('clip-ready')) {
                                vid.pause();
                                vid.currentTime = 0;
                            }
                        });
                    
                        // Set the source using our simplified filename
                        vid.src = `/static/clips/${clipFilename}`;
                    });
    </script>
</body>
</html>
